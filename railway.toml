[build]
builder = "NIXPACKS"
 
[deploy]
startCommand = "apt-get install -y libasound2t64 libgbm1 libxcb1 libglib2.0-0 libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libatspi2.0-0 libx11-6 libxcomposite1 libxdamage1 libxext6 libxfixes3 libxrandr2 libxkbcommon0 libpango-1.0-0 libcairo2 && playwright install chromium && python scraper.py"
cronSchedule = "*/5 * * * *"
restartPolicyType = "never"
 
